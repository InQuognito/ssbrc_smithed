name: Build Sandstone pack

on:
  push

jobs:
  build_pack:
    runs-on: ubuntu-latest

    steps:
      - name: Build Start
        run: |
          curl "https://mc.bloom.host/api/client/servers/${{ secrets.BLOOM_SERVER_ID }}/command" \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.BLOOM_API_KEY }}' \
            -X POST \
            -d '{
              "command": "function ssbrc:server/start"
            }'

      - name: Checkout source Git branch
        uses: actions/checkout@v6
        with:
            ref: ${{ github.ref }}
            fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Pack from TS
        run: |
          bun i
          bun dev:build
          bun deploy

      - name: Upload Resourcepack
        uses: actions/upload-artifact@v4
        with:
          name: ssbrc-latest
          path: |
            .sandstone/output/resourcepack/assets/
            .sandstone/output/resourcepack/pack.mcmeta
            .sandstone/output/resourcepack/pack.png

      - name: Build Finish
        run: |
          curl "https://mc.bloom.host/api/client/servers/${{ secrets.BLOOM_SERVER_ID }}/command" \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.BLOOM_API_KEY }}' \
            -X POST \
            -d '{
              "command": "function ssbrc:server/finish"
            }'
