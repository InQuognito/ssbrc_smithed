name: Build Sandstone pack

on:
  push

jobs:
  build_pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source Git branch
        uses: actions/checkout@v6
        with:
            ref: ${{ github.ref }}
            fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Pack from TS
        run: |
          bun i
          bun dev:build

      - name: Upload Resourcepack
        uses: actions/upload-artifact@v4
        with:
          name: ssbrc-latest
          path: |
            .sandstone/output/resourcepack/assets/
            .sandstone/output/resourcepack/pack.mcmeta
            .sandstone/output/resourcepack/pack.png

      - name: Publish Pack to Server
        env:
          MCS_MANAGER_TOKEN: ${{ secrets.MCS_MANAGER_TOKEN }}
          MCS_MANAGER_UUID: ${{ secrets.MCS_MANAGER_UUID }}
          MCS_MANAGER_DAEMON_ID: ${{ secrets.MCS_MANAGER_DAEMON_ID }}
          MCS_MANAGER_COOKIE: ${{ secrets.MCS_MANAGER_COOKIE }}
          MCS_MANAGER_ENDPOINT: ${{ secrets.MCS_MANAGER_ENDPOINT }}
          MCS_MANAGER_DATAPACKS_DIR: ${{ secrets.MCS_MANAGER_DATAPACKS_DIR }}
        run: |
          bun dev:deploy
